<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cherickal Kudumbayogam Live</title>
  
  <!-- Meta refresh for instant redirection (placeholder URL: YouTube) -->
  <meta http-equiv="refresh" content="2; url=https://www.youtube.com/">
  
  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="ചേരിക്കൽ കുടുംബയോഗം 2026 - Live Stream">
  <meta property="og:description" content="Watch the Cherickal Kudumbayogam 2026 Live Stream.">
  <meta property="og:image" content="https://codemedic.github.io/cherickal-2026/poster.jpeg">
  <meta property="og:url" content="https://codemedic.github.io/cherickal-2026/live.html">
  <meta property="og:type" content="video.other">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Manjari:wght@400;700&display=swap');

    :root {
      --bg-color: #0b0713;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --gold-primary: #e2b767;
      --gold-secondary: #b38728;
      --gold-glow: rgba(226, 183, 103, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Outfit', 'Manjari', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    .bg-decorations {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      opacity: 0.3;
      pointer-events: none;
    }

    .blob-1 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #4a154b 0%, transparent 70%);
      top: -100px;
      left: -100px;
    }

    .blob-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #1a365d 0%, transparent 70%);
      bottom: -150px;
      right: -150px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 32px 24px;
      z-index: 1;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      text-align: center;
    }

    .icon-wrapper {
      margin-bottom: 24px;
      position: relative;
      display: inline-block;
    }

    .live-dot {
      position: absolute;
      top: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background-color: #ff3b30;
      border-radius: 50%;
      box-shadow: 0 0 10px #ff3b30;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.5; }
      100% { transform: scale(0.9); opacity: 1; }
    }

    .tv-icon {
      font-size: 3rem;
      color: var(--gold-primary);
      filter: drop-shadow(0 0 10px var(--gold-glow));
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.4;
      background: linear-gradient(135deg, #ffffff 30%, var(--gold-primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--gold-primary);
      margin: 0 auto 24px auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      width: 100%;
      background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-secondary) 100%);
      color: #0b0713;
      box-shadow: 0 4px 15px var(--gold-glow);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--gold-glow);
    }
  </style>
</head>
<body>

  <div class="bg-decorations">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="container">
    <div class="icon-wrapper">
      <div class="tv-icon">📺</div>
      <div class="live-dot"></div>
    </div>
    
    <h1>ലൈവ് സ്ട്രീമിലേക്ക് റീഡയറക്ട് ചെയ്യുന്നു...</h1>
    <p>Redirecting you to the Cherickal Kudumbayogam 2026 Live Stream. If the page does not open automatically in a few seconds, please tap the button below.</p>
    
    <div class="spinner"></div>
    
    <a href="https://www.youtube.com/" class="btn" id="redirectBtn">
      ക്ലിക്ക് ചെയ്യുക / Open Live Stream
    </a>
  </div>

  <script>
    // YouTube Live stream URL placeholder (change this when the actual event link is ready)
    const liveStreamUrl = "https://www.youtube.com/";

    // Fallback JavaScript redirection
    setTimeout(() => {
      window.location.replace(liveStreamUrl);
    }, 1500);

    // Update button target in case JS runs
    document.getElementById('redirectBtn').href = liveStreamUrl;
  </script>

</body>
</html>
